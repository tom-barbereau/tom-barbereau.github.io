baseURL = "https://tom-barbereau.github.io"
languageCode = "en-us"
title = "Dr. Tom Barbereau"

summaryLength = 1_000_000
rssLimit = 10
paginate = 15

[taxonomies]
  tags = "tags"

[permalinks]
  posts = "/blog/:slug"
  links = "/blog/links/:slug"

[author]
  name = "Tom Barbereau"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    ordered = true
