[params]
# Home meta description
description = "A technology oriented personal website and blog curated by Tom Barbereau."
googleTagManagerId = "G-X45SFSJKY5" # Your Google Tag Manager ID

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content in markdown
homeIntroTitle = 'Hi!'
homeIntroContent = """
I am a scientist specialist at TNO (Dutch Organisation for Applied Scientific Research) and research fellow at the Institute for Information Law (IViR) at the University of Amsterdam.

**My work:**
- Governance of digital technologies and their impact on organisations, economy, and society
- Cryptographic and privacy-enhancing technologies, and how they foster or obfuscate trust
- Teaching and research in blockchain, cryptocurrencies, and decentralised systems
- Critical analysis of how power and politics shape technological systems

I ask uncomfortable questions about who benefits from technology and why."""

singleDateFormat = '2 Jan 2006'

# Collection to display on home
