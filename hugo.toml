baseURL = 'https://tom-barbereau.github.io'
languageCode = 'en-us'
title = 'Tom Barbereau'
theme = 'typo'

[taxonomies]
tag = 'tags'

[params]
# Home meta description
description = "A technology oriented personal website and blog curated by Tom Barbereau."
googleTagManagerId = "G-X45SFSJKY5" # Your Google Tag Manager ID

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content in markdown
homeIntroTitle = 'Hi!'
homeIntroContent = """
I am a scientist at TNO. My work focuses on the governance of digital technologies, including their impact on organisations, the economy, and society. 
My current work and research focuses on cryptographic techniques and privacy-enhancing technologies.\\
Asides, I am a research fellow at the Institute for Information Law at the University of Amsterdam. 
My attention is dedicated to teaching, mostly in relation to cryptocurrencies and blockchain.
"""

singleDateFormat = '2 Jan 2006'

# Collection to display on home
# homeCollectionTitle = 'Posts'
# homeCollection = 'posts'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '02 Jan 2006'

# Footer
showFooter = true

# Breadcrumbs
[params.breadcrumbs]
enabled = true
showCurrentPage = true
home = "~"

# Social icons
[[params.social]]
name = "linkedin"
url = "https://www.linkedin.com/in/tom.barbereau/"

[[params.social]]
name = "github"
url = "https://github.com/tom-barbereau"

[[params.social]]
name = "googlescholar"
url = "https://scholar.google.com/citations?user=YOUR_USER_ID"

[[params.social]]
name = "bluesky"
url = "https://bsky.app/profile/YOUR_HANDLE"

# Main menu pages
# [[params.menu]]
# name = "home"
# url = "/"

[[params.menu]]
name = "posts"
url = "/posts"

[[params.menu]]
name = "about"
url = "/about"

[[params.menu]]
name = "portfolio"
url = "/portfolio"

# [[params.menu]]
# name = "tags"
# url = "/tags"


# Syntax highlight on code blocks
[markup]
[markup.highlight]
style = 'bw'

# Deploy settings

[[deployment.matchers]]
pattern = "^.+\\.(js|css|svg|ttf|woff2)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = true

[[deployment.matchers]]
pattern = "^.+\\.(png|jpg|gif|webp)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = false

[params.umami]
enable = true
websiteId = "f6c4d624-c73d-490b-bbf8-d62bd0bd1c24"
jsLocation = "https://cloud.umami.is/script.js"
