# Syntax highlight on code blocks
[markup]
[markup.highlight]
style = 'bw'

# Deploy settings

[[deployment.matchers]]
pattern = "^.+\\.(js|css|svg|ttf|woff2)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = true

[[deployment.matchers]]
pattern = "^.+\\.(png|jpg|gif|webp)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = false

[params.umami]
enable = true
websiteId = "f6c4d624-c73d-490b-bbf8-d62bd0bd1c24"
jsLocation = "https://cloud.umami.is/script.js"

[permalinks]
posts = "/posts/:year/:month/:slug/"

[outputs]
home = ["HTML", "RSS", "RobotsTXT"]
