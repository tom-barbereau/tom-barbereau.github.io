<!-- layouts/_default/blog.html -->


{{ define "blog" }}
  {{ $permalink := .Permalink }}
  {{ range (.Paginate (where site.RegularPages "Section" "in" (slice "posts" "links"))).Pages }}
    {{ partial "article" (dict "Page" . "Permalink" $permalink) }}
    <hr>
  {{ end }}
  {{ template "_internal/pagination.html" . }}
{{ end }}
